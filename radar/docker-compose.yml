version: "3.9"

# ─── RADAR — Docker Compose ────────────────────────────────────────────────────
# Usage:
#   docker compose up --build         # first run (builds images)
#   docker compose up -d              # run in background
#   docker compose down               # stop
#   docker compose down -v            # stop + delete database volume
#
# Access:
#   Dashboard:  http://localhost
#   API Docs:   http://localhost/api/docs
#   Backend:    http://localhost:8080  (direct, optional)

services:

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .            # radar/ directory
      dockerfile: Dockerfile.backend
    container_name: radar-backend
    restart: unless-stopped
    environment:
      # Copy values from your .env file, or override here
      - BACKEND_PORT=8080
      - DATABASE_PATH=/app/data/radar.db
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SECRET_KEY=${SECRET_KEY:-radar_docker_secret_change_me}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEO_PROVIDER=${GEO_PROVIDER:-ipapi}
      - GEO_API_KEY=${GEO_API_KEY:-}
      - AI_PROVIDER=${AI_PROVIDER:-gemini}
      - FRONTEND_ORIGIN=http://localhost
    volumes:
      # Persist SQLite database across container restarts
      - radar_data:/app/data
    ports:
      # Expose backend directly (optional — for attack tools running on host)
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=3)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Nginx Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend   # radar/frontend/ directory
      dockerfile: Dockerfile
    container_name: radar-frontend
    restart: unless-stopped
    ports:
      # Main dashboard — open http://localhost in your browser
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  radar_data:
    driver: local
