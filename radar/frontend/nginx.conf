server {
    listen 80;
    server_name _;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Serve built React frontend
    root /usr/share/nginx/html;
    index index.html;

    # ── REST API proxy to backend ──────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Connection "";
        proxy_read_timeout 120s;
    }

    # ── Ingest shortcut (attack tools post here) ───────────────────────────────
    location /ingest {
        proxy_pass         http://backend:8080/ingest;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Connection "";
    }

    # ── Health check ───────────────────────────────────────────────────────────
    location /health {
        proxy_pass         http://backend:8080/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Connection "";
    }

    # ── WebSocket proxy (must upgrade connection) ──────────────────────────────
    location /ws/ {
        proxy_pass         http://backend:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;   # Keep WS connections alive for 24h
        proxy_send_timeout 86400s;
    }

    # ── SPA fallback — all non-asset routes go to index.html ──────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ───────────────────────────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
